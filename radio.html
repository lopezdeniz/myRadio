<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<title>Radio — Club / US / RU / ES</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Helvetica Neue','Segoe UI',Roboto,sans-serif;background:#0b0b0d;color:#fff;user-select:none;-webkit-user-select:none;}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-h:64px;
  --accent:#ff375f;
  --accent2:#7c4dff;
  --card:rgba(255,255,255,.06);
  --card-b:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.08);
  --blur:saturate(180%) blur(24px);
  --tr:.3s cubic-bezier(.32,.72,0,1);
}
#app{position:relative;width:100%;height:100%;overflow:hidden;background:
  radial-gradient(circle at 15% -10%, rgba(124,77,255,.25), transparent 45%),
  radial-gradient(circle at 100% 0%, rgba(255,55,95,.18), transparent 40%),
  #0b0b0d;}
.pages{position:relative;width:100%;height:100%;}
.page{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(6px);transition:opacity var(--tr), transform var(--tr);
  padding-top:calc(var(--safe-top) + 10px); padding-bottom:calc(var(--safe-bottom) + var(--tab-h));}
.page.active{opacity:1;pointer-events:auto;transform:translateY(0);}

/* ===== TOP BAR ===== */
.topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:6px 18px 10px;}
.topbar h1{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;cursor:pointer;}
.icon-btn.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== PLAYER PAGE ===== */
#page-player{align-items:center;justify-content:center;text-align:center;gap:2px;padding-left:24px;padding-right:24px;}
.player-cat{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;opacity:.9;}
.player-art{width:220px;height:220px;border-radius:50%;background:linear-gradient(145deg,#232327,#141416);display:flex;align-items:center;justify-content:center;font-size:70px;box-shadow:0 20px 50px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06);position:relative;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.06);}
.player-art img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.player-art.playing{animation:spin 14s linear infinite;}
.player-art .ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent;}
.player-art.loading .ring{border-top-color:var(--accent);animation:spin .8s linear infinite;}
.player-art .dot{position:absolute;top:50%;left:50%;width:14px;height:14px;margin:-7px;border-radius:50%;background:#0b0b0d;border:1px solid rgba(255,255,255,.15);}
.player-station{font-size:24px;font-weight:800;margin-top:24px;letter-spacing:-.3px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;}
.player-meta{font-size:13.5px;color:rgba(255,255,255,.5);margin-top:6px;display:flex;align-items:center;gap:8px;justify-content:center;}
.player-meta .live{display:flex;align-items:center;gap:5px;color:#ff4d4d;font-weight:700;}
.player-meta .live .dot2{width:6px;height:6px;border-radius:50%;background:#ff4d4d;box-shadow:0 0 0 0 rgba(255,77,77,.6);animation:pulse 1.6s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,77,.55);}70%{box-shadow:0 0 0 8px rgba(255,77,77,0);}100%{box-shadow:0 0 0 0 rgba(255,77,77,0);}}
.status-line{font-size:12.5px;color:rgba(255,255,255,.35);margin-top:10px;min-height:16px;}

.controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-top:32px;}
.ctrl-btn{background:var(--card);border:1px solid var(--line);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ctrl-btn.small{width:52px;height:52px;font-size:19px;}
.ctrl-btn.big{width:76px;height:76px;font-size:28px;background:linear-gradient(145deg,var(--accent),#c92150);border:none;box-shadow:0 10px 26px rgba(255,55,95,.35);}
.ctrl-btn.fav{width:52px;height:52px;font-size:20px;}
.ctrl-btn.fav.active{color:var(--accent);border-color:rgba(255,55,95,.5);}
.ctrl-btn:active{transform:scale(.94);}

.volume-row{display:flex;align-items:center;gap:10px;width:100%;max-width:280px;margin-top:30px;}
.volume-row span{font-size:15px;opacity:.6;width:18px;text-align:center;}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.15);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);}

/* ===== STATIONS PAGE ===== */
#page-stations,#page-favorites{padding-left:0;padding-right:0;}
.search-wrap{padding:0 16px 10px;flex:0 0 auto;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 14px;}
.search-box input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px;}
.search-box input::placeholder{color:rgba(255,255,255,.35);}
.chips{display:flex;gap:8px;padding:2px 16px 12px;overflow-x:auto;flex:0 0 auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;padding:8px 16px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:13.5px;font-weight:600;color:rgba(255,255,255,.65);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.chip.active{background:#fff;color:#0b0b0d;border-color:#fff;}

.list{flex:1;overflow-y:auto;padding:2px 16px 24px;-webkit-overflow-scrolling:touch;}
.list::-webkit-scrollbar{display:none;}
.station-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:16px;margin-bottom:8px;background:var(--card);border:1px solid transparent;cursor:pointer;}
.station-item.current{border-color:rgba(255,55,95,.4);background:rgba(255,55,95,.08);}
.st-art{width:46px;height:46px;border-radius:50%;background:linear-gradient(145deg,#2a2a2e,#18181a);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;overflow:hidden;position:relative;}
.st-art img{width:100%;height:100%;object-fit:cover;}
.st-info{flex:1;min-width:0;}
.st-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.st-meta{font-size:12px;color:rgba(255,255,255,.42);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.st-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.st-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.st-btn.star.active{color:var(--accent);}
.st-btn.play.playing{background:var(--accent);}
.eq{display:flex;align-items:flex-end;gap:2px;height:14px;width:14px;}
.eq span{width:3px;background:var(--accent);border-radius:1px;animation:eq 0.9s ease-in-out infinite;}
.eq span:nth-child(1){animation-delay:-.6s;} .eq span:nth-child(2){animation-delay:-.3s;} .eq span:nth-child(3){animation-delay:0s;}
@keyframes eq{0%,100%{height:3px;}50%{height:13px;}}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:rgba(255,255,255,.4);padding:40px;text-align:center;}
.empty-state .em-icon{font-size:40px;opacity:.6;}
.skel{height:64px;border-radius:16px;margin-bottom:8px;background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(255,255,255,.09),rgba(255,255,255,.04));background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ===== TABS ===== */
.tabs{position:absolute;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(18,18,20,.85);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:.5px solid var(--line);display:flex;z-index:30;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:rgba(255,255,255,.4);font-size:10.5px;font-weight:600;cursor:pointer;position:relative;}
.tab-btn .ic{font-size:21px;}
.tab-btn.active{color:#fff;}
.tab-btn .badge{position:absolute;top:2px;right:calc(50% - 22px);min-width:16px;height:16px;border-radius:8px;background:var(--accent);font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;opacity:0;transition:opacity .2s;}
.tab-btn .badge.show{opacity:1;}

/* ===== TOAST ===== */
.toast{position:absolute;left:50%;bottom:calc(var(--tab-h) + var(--safe-bottom) + 14px);transform:translateX(-50%) translateY(10px);background:rgba(30,30,32,.96);border:1px solid var(--line);color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:14px;z-index:60;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;max-width:86%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== PERMISSION OVERLAY ===== */
.perm-overlay{position:absolute;inset:0;background:#0b0b0d;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .3s;}
.perm-overlay.show{opacity:1;pointer-events:auto;}
.perm-logo{font-size:64px;}
.perm-overlay h2{font-size:22px;font-weight:800;}
.perm-overlay p{font-size:14px;color:rgba(255,255,255,.5);max-width:280px;line-height:1.5;}
.perm-btn{margin-top:10px;background:linear-gradient(145deg,var(--accent),#c92150);border:none;color:#fff;font-size:16px;font-weight:700;padding:15px 40px;border-radius:16px;cursor:pointer;box-shadow:0 10px 26px rgba(255,55,95,.35);}
</style>
</head>
<body>
<div id="app">
  <div class="pages">

    <section class="page active" id="page-player">
      <div class="player-cat" id="playerCat">Radio</div>
      <div class="player-art" id="playerArt">
        <span class="placeholder" id="playerArtPlaceholder">📻</span>
        <div class="ring"></div>
        <div class="dot"></div>
      </div>
      <div class="player-station" id="playerStation">Выберите станцию</div>
      <div class="player-meta" id="playerMeta"></div>
      <div class="status-line" id="statusLine">Нажмите «Станции», чтобы начать</div>
      <div class="controls">
        <button class="ctrl-btn small" id="prevBtn" aria-label="Предыдущая">⏮</button>
        <button class="ctrl-btn big" id="playBtn" aria-label="Play">▶</button>
        <button class="ctrl-btn small" id="nextBtn" aria-label="Следующая">⏭</button>
      </div>
      <button class="ctrl-btn fav" id="favBtn" style="margin-top:18px;" aria-label="Избранное">♡</button>
      <div class="volume-row">
        <span>🔈</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="90" />
        <span>🔊</span>
      </div>
    </section>

    <section class="page" id="page-stations">
      <div class="topbar">
        <h1>Станции</h1>
        <button class="icon-btn" id="refreshBtn" aria-label="Обновить">⟳</button>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Поиск станции, страны, жанра..." />
        </div>
      </div>
      <div class="chips" id="catFilters"></div>
      <div class="list" id="stationList"></div>
    </section>

    <section class="page" id="page-favorites">
      <div class="topbar">
        <h1>Избранное</h1>
      </div>
      <div class="list" id="favList"></div>
    </section>

  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-page="0"><span class="ic">▶</span><span>Плеер</span></button>
    <button class="tab-btn" data-page="1"><span class="ic">📻</span><span>Станции</span></button>
    <button class="tab-btn" data-page="2"><span class="ic">♡</span><span>Избранное</span><span class="badge" id="favBadge"></span></button>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="perm-overlay show" id="permOverlay">
    <div class="perm-logo">📻</div>
    <h2>Radio Club</h2>
    <p>Клубная музыка, американские, русские и испаноязычные станции. Нажмите, чтобы начать слушать.</p>
    <button class="perm-btn" id="permBtn">Слушать</button>
  </div>
</div>

<script>
(() => {
'use strict';

/* ============================================================
   CATEGORIES
   ============================================================ */
const CATEGORIES = [
  { id: 'club', label: 'Клубная', icon: '🎧', color: '#ff375f',
    query: { tagList: 'club,dance,house,electronic,techno,edm,trance', order: 'clickcount', reverse: 'true', limit: 60 } },
  { id: 'us', label: 'США', icon: '🇺🇸', color: '#3aa0ff',
    query: { countrycode: 'US', tag: 'pop', order: 'clickcount', reverse: 'true', limit: 60 } },
  { id: 'ru', label: 'Русские', icon: '🇷🇺', color: '#ffb23a',
    query: { language: 'russian', order: 'clickcount', reverse: 'true', limit: 60 } },
  { id: 'es', label: 'Испанские', icon: '🇪🇸', color: '#39d98a',
    query: { language: 'spanish', order: 'clickcount', reverse: 'true', limit: 60 } },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

/* Verified evergreen fallback stations — guarantee the app always has
   something playable even if the Radio-Browser API is unreachable. */
const SEED_STATIONS = [
  { id:'seed_club_1', name:'181.FM — Party 181', category:'club', country:'USA', url:'https://listen.181fm.com/181-party_128k.mp3', tags:'dance,pop,club' },
  { id:'seed_club_2', name:'181.FM — Techno Club', category:'club', country:'USA', url:'https://listen.181fm.com/181-technoclub_128k.mp3', tags:'techno,club,electronic' },
  { id:'seed_club_3', name:'181.FM — 90s Dance', category:'club', country:'USA', url:'https://listen.181fm.com/181-90sdance_128k.mp3', tags:'dance,90s,club' },
  { id:'seed_club_4', name:'181.FM — Energy 98 (Dance Hits)', category:'club', country:'USA', url:'https://listen.181fm.com/181-energy98_128k.mp3', tags:'dance,hits,club' },
  { id:'seed_club_5', name:'SomaFM — Groove Salad', category:'club', country:'USA', url:'https://ice5.somafm.com/groovesalad-128-mp3', tags:'chillout,downtempo,lounge' },
  { id:'seed_club_6', name:'SomaFM — The Trip', category:'club', country:'USA', url:'https://ice5.somafm.com/thetrip-128-mp3', tags:'techno,trance,club' },
  { id:'seed_us_1', name:'181.FM — Jammin Oldschool', category:'us', country:'USA', url:'https://listen.181fm.com/181-jammin_128k.mp3', tags:'hiphop,rnb,pop' },
  { id:'seed_us_2', name:'181.FM — The Vibe (Urban)', category:'us', country:'USA', url:'https://listen.181fm.com/181-vibe_128k.mp3', tags:'rnb,urban,pop' },
  { id:'seed_us_3', name:'181.FM — Awesome 80s', category:'us', country:'USA', url:'https://listen.181fm.com/181-awesome80s_128k.mp3', tags:'pop,80s' },
  { id:'seed_ru_1', name:'Радио Рекорд — Main', category:'ru', country:'Россия', url:'https://radiorecord.hostingradio.ru/rr_main96.aacp', tags:'dance,club,electronic' },
  { id:'seed_ru_2', name:'Радио Рекорд — Summer Dance', category:'ru', country:'Россия', url:'https://radiorecord.hostingradio.ru/summerparty96.aacp', tags:'dance,club,summer' },
  { id:'seed_ru_3', name:'Радио Рекорд — Latina Dance', category:'ru', country:'Россия', url:'https://radiorecord.hostingradio.ru/latina96.aacp', tags:'latina,dance,club' },
  { id:'seed_ru_4', name:'Радио Ультра', category:'ru', country:'Россия', url:'https://nashe1.hostingradio.ru/ultra-128.mp3', tags:'dance,electronic,club' },
  { id:'seed_ru_5', name:'Ретро FM', category:'ru', country:'Россия', url:'https://retroserver.streamr.ru/retro256.mp3', tags:'pop,retro' },
];

/* Radio-Browser mirrors — the API is community-run across several hosts.
   We try a random one each time and automatically fail over to the next
   if a host is slow or down, which is the main reason streams used to
   "work sometimes and not others". */
let RB_HOSTS = [
  'https://de1.api.radio-browser.info',
  'https://de2.api.radio-browser.info',
  'https://at1.api.radio-browser.info',
  'https://nl1.api.radio-browser.info',
];

async function discoverHosts() {
  try {
    const res = await fetchWithTimeout('https://all.api.radio-browser.info/json/servers', 5000);
    if (res) {
      const list = await res.json();
      const hosts = list.map(s => 'https://' + s.name).filter(Boolean);
      if (hosts.length) RB_HOSTS = shuffle(hosts.concat(RB_HOSTS)).slice(0, 8);
    }
  } catch (_) { /* keep hardcoded hosts */ }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal, headers: { 'User-Agent': 'RadioClubApp/2.0' } })
    .then(r => { clearTimeout(t); return r.ok ? r : null; })
    .catch(() => { clearTimeout(t); return null; });
}

async function rbFetch(path) {
  const hosts = shuffle(RB_HOSTS);
  for (const host of hosts) {
    try {
      const res = await fetchWithTimeout(host + path, 6500);
      if (res) {
        const data = await res.json();
        if (Array.isArray(data)) return data;
      }
    } catch (_) { /* try next host */ }
  }
  return null;
}

function buildQuery(params) {
  return '/json/stations/search?' + new URLSearchParams(params).toString() + '&hidebroken=true';
}

async function fetchCategory(cat) {
  let data = await rbFetch(buildQuery(cat.query));
  if (!data || data.length < 5) {
    // broaden the search if too few results came back
    const loose = { ...cat.query };
    delete loose.tag;
    if (cat.id === 'club') loose.tagList = 'dance,club';
    const data2 = await rbFetch(buildQuery(loose));
    if (data2 && data2.length) data = (data || []).concat(data2);
  }
  return (data || []).map(s => normalizeApiStation(s, cat.id));
}

function normalizeApiStation(s, categoryId) {
  return {
    id: s.stationuuid || ('api_' + s.name + Math.random()),
    name: (s.name || 'Без названия').trim(),
    category: categoryId,
    country: s.country || '',
    language: s.language || '',
    tags: s.tags || '',
    bitrate: s.bitrate || 0,
    favicon: (s.favicon && s.favicon.startsWith('http')) ? s.favicon : '',
    url: s.url_resolved || s.url || '',
    urlAlt: s.url || '',
  };
}

function normalizeSeed(s) {
  return { ...s, language: '', bitrate: 0, favicon: '', urlAlt: '' };
}

/* ============================================================
   STATE
   ============================================================ */
const state = {
  page: 0,
  allStations: [],          // combined normalized list
  currentCategory: 'all',
  searchQuery: '',
  favorites: [],
  currentStation: null,
  isPlaying: false,
  isLoading: false,
  volume: 0.9,
  brokenIds: new Set(),
  loadedOnce: false,
};

const el = (id) => document.getElementById(id);
const playerArt = el('playerArt');
const playerArtPlaceholder = el('playerArtPlaceholder');
const playerStation = el('playerStation');
const playerMeta = el('playerMeta');
const playerCat = el('playerCat');
const statusLine = el('statusLine');
const playBtn = el('playBtn');
const prevBtn = el('prevBtn');
const nextBtn = el('nextBtn');
const favBtn = el('favBtn');
const volumeSlider = el('volumeSlider');
const searchInput = el('searchInput');
const catFilters = el('catFilters');
const stationList = el('stationList');
const favList = el('favList');
const favBadge = el('favBadge');
const toastEl = el('toast');
const refreshBtn = el('refreshBtn');
const permOverlay = el('permOverlay');
const permBtn = el('permBtn');

/* ============================================================
   AUDIO ENGINE — robust playback with auto-retry & auto-fallback
   ============================================================ */
const audio = new Audio();
audio.preload = 'none';
let candidates = [];
let candidateIndex = 0;
let watchdogTimer = null;
let lastTime = 0;
let stallTicks = 0;
let connectTimer = null;

function buildCandidates(station) {
  const list = [];
  const push = (u) => { if (u && !list.includes(u)) list.push(u); };
  const raw = station.url || '';
  if (raw.startsWith('http://')) push(raw.replace('http://', 'https://'));
  push(raw);
  if (station.urlAlt && station.urlAlt !== raw) {
    if (station.urlAlt.startsWith('http://')) push(station.urlAlt.replace('http://', 'https://'));
    push(station.urlAlt);
  }
  return list;
}

function setLoading(v) {
  state.isLoading = v;
  playerArt.classList.toggle('loading', v);
}

function playStation(station) {
  if (!station) return;
  clearTimeout(connectTimer);
  state.currentStation = station;
  state.brokenForSession = false;
  candidates = buildCandidates(station);
  candidateIndex = 0;
  renderPlayerInfo();
  updateFavButton();
  renderStationList();
  renderFavorites();
  attemptPlay();
  saveRecent(station);
}

function attemptPlay() {
  if (candidateIndex >= candidates.length) {
    setLoading(false);
    state.isPlaying = false;
    updatePlayButton();
    statusLine.textContent = 'Станция недоступна — пробуем следующую';
    showToast('Не удалось подключиться к станции');
    setTimeout(() => nextStation(true), 900);
    return;
  }
  const url = candidates[candidateIndex++];
  setLoading(true);
  statusLine.textContent = 'Подключение...';
  try { audio.pause(); } catch (_) {}
  audio.src = url;
  audio.volume = state.volume;
  clearTimeout(connectTimer);
  connectTimer = setTimeout(() => {
    if (state.isLoading) attemptPlay(); // this candidate took too long
  }, 8000);
  const p = audio.play();
  if (p && p.catch) p.catch(() => attemptPlay());
}

audio.addEventListener('playing', () => {
  clearTimeout(connectTimer);
  setLoading(false);
  state.isPlaying = true;
  updatePlayButton();
  statusLine.textContent = '';
  stallTicks = 0;
  startWatchdog();
  updateMediaSession();
  renderStationList();
  renderFavorites();
});
audio.addEventListener('error', () => attemptPlay());
audio.addEventListener('stalled', () => { /* watchdog handles reconnects */ });
audio.addEventListener('pause', () => {
  if (state.isPlaying) { state.isPlaying = false; updatePlayButton(); }
});

function startWatchdog() {
  clearInterval(watchdogTimer);
  lastTime = audio.currentTime;
  stallTicks = 0;
  watchdogTimer = setInterval(() => {
    if (!state.currentStation || audio.paused) return;
    if (audio.currentTime === lastTime) {
      stallTicks++;
      if (stallTicks >= 2) {
        stallTicks = 0;
        statusLine.textContent = 'Переподключение...';
        candidateIndex = 0;
        attemptPlay();
      }
    } else {
      stallTicks = 0;
    }
    lastTime = audio.currentTime;
  }, 9000);
}

function togglePlay() {
  if (!state.currentStation) {
    const list = getFilteredStations();
    if (list.length) playStation(list[0]);
    else showToast('Список станций загружается...');
    return;
  }
  if (state.isPlaying) {
    audio.pause();
    state.isPlaying = false;
    updatePlayButton();
    clearInterval(watchdogTimer);
  } else {
    candidateIndex = Math.max(0, candidateIndex - 1);
    attemptPlay();
  }
}

function nextStation(auto) {
  const list = getFilteredStations();
  if (!list.length) return;
  const idx = list.findIndex(s => state.currentStation && s.id === state.currentStation.id);
  const next = list[(idx + 1 + list.length) % list.length];
  playStation(next);
}
function prevStation() {
  const list = getFilteredStations();
  if (!list.length) return;
  const idx = list.findIndex(s => state.currentStation && s.id === state.currentStation.id);
  const prev = list[(idx - 1 + list.length) % list.length];
  playStation(prev);
}

window.addEventListener('online', () => {
  showToast('Соединение восстановлено');
  if (state.currentStation && !state.isPlaying) { candidateIndex = 0; attemptPlay(); }
});
window.addEventListener('offline', () => showToast('Нет подключения к интернету'));

/* ============================================================
   MEDIA SESSION (lock screen controls)
   ============================================================ */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !state.currentStation) return;
  const s = state.currentStation;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.name,
    artist: CAT_MAP[s.category] ? CAT_MAP[s.category].label : 'Radio',
    album: 'Radio Club',
    artwork: s.favicon ? [{ src: s.favicon, sizes: '512x512', type: 'image/png' }] : [],
  });
  navigator.mediaSession.setActionHandler('play', togglePlay);
  navigator.mediaSession.setActionHandler('pause', togglePlay);
  navigator.mediaSession.setActionHandler('previoustrack', prevStation);
  navigator.mediaSession.setActionHandler('nexttrack', nextStation);
}

/* ============================================================
   RENDER — Player page
   ============================================================ */
function updatePlayButton() {
  playBtn.textContent = state.isPlaying ? '⏸' : '▶';
  playerArt.classList.toggle('playing', state.isPlaying);
}

function renderPlayerInfo() {
  const s = state.currentStation;
  if (!s) {
    playerStation.textContent = 'Выберите станцию';
    playerMeta.innerHTML = '';
    playerCat.textContent = 'Radio';
    return;
  }
  const cat = CAT_MAP[s.category];
  playerCat.textContent = cat ? (cat.icon + ' ' + cat.label) : 'Radio';
  playerStation.textContent = s.name;
  const parts = [];
  if (s.country) parts.push(s.country);
  if (s.bitrate) parts.push(s.bitrate + ' kbps');
  playerMeta.innerHTML = '<span class="live"><span class="dot2"></span>LIVE</span>' + (parts.length ? ' · ' + parts.join(' · ') : '');
  playerArtPlaceholder.textContent = cat ? cat.icon : '📻';
  if (s.favicon) {
    playerArt.innerHTML = `<img src="${s.favicon}" onerror="this.remove()" /><div class="ring"></div><div class="dot"></div>`;
  } else {
    playerArt.innerHTML = `<span class="placeholder">${cat ? cat.icon : '📻'}</span><div class="ring"></div><div class="dot"></div>`;
  }
}

function updateFavButton() {
  const active = state.currentStation && isFav(state.currentStation);
  favBtn.classList.toggle('active', !!active);
  favBtn.textContent = active ? '♥' : '♡';
}

/* ============================================================
   FAVORITES (localStorage)
   ============================================================ */
function loadFavorites() {
  try { state.favorites = JSON.parse(localStorage.getItem('radio_favs_v2') || '[]'); }
  catch (_) { state.favorites = []; }
  updateFavBadge();
}
function saveFavorites() {
  try { localStorage.setItem('radio_favs_v2', JSON.stringify(state.favorites)); } catch (_) {}
  updateFavBadge();
}
function isFav(station) { return state.favorites.some(f => f.id === station.id); }
function toggleFav(station) {
  if (isFav(station)) state.favorites = state.favorites.filter(f => f.id !== station.id);
  else state.favorites.unshift(station);
  saveFavorites();
}
function updateFavBadge() {
  favBadge.textContent = state.favorites.length;
  favBadge.classList.toggle('show', state.favorites.length > 0);
}
function saveRecent(station) {
  try { localStorage.setItem('radio_recent_v2', JSON.stringify(station)); } catch (_) {}
}

/* ============================================================
   RENDER — station lists
   ============================================================ */
function getFilteredStations() {
  let list = state.allStations;
  if (state.currentCategory !== 'all') list = list.filter(s => s.category === state.currentCategory);
  if (state.searchQuery.trim()) {
    const q = state.searchQuery.trim().toLowerCase();
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.country || '').toLowerCase().includes(q) ||
      (s.tags || '').toLowerCase().includes(q));
  }
  return list;
}

function stationRowHtml(s, opts) {
  const cat = CAT_MAP[s.category];
  const playing = state.currentStation && state.currentStation.id === s.id && state.isPlaying;
  const fav = isFav(s);
  const art = s.favicon
    ? `<img src="${s.favicon}" onerror="this.parentElement.textContent='${cat ? cat.icon : '📻'}'" />`
    : (cat ? cat.icon : '📻');
  const metaParts = [];
  if (cat) metaParts.push(cat.label);
  if (s.country) metaParts.push(s.country);
  const playIcon = playing ? `<div class="eq"><span></span><span></span><span></span></div>` : (state.currentStation && state.currentStation.id === s.id && state.isLoading ? '⋯' : '▶');
  return `
    <div class="station-item ${state.currentStation && state.currentStation.id === s.id ? 'current' : ''}" data-id="${s.id}">
      <div class="st-art">${art}</div>
      <div class="st-info">
        <div class="st-name">${escapeHtml(s.name)}</div>
        <div class="st-meta">${escapeHtml(metaParts.join(' · '))}</div>
      </div>
      <div class="st-actions">
        <button class="st-btn star ${fav ? 'active' : ''}" data-action="fav" data-id="${s.id}">${fav ? '♥' : '♡'}</button>
        <button class="st-btn play ${playing ? 'playing' : ''}" data-action="play" data-id="${s.id}">${playIcon}</button>
      </div>
    </div>`;
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function renderStationList() {
  const list = getFilteredStations();
  if (!state.loadedOnce) {
    stationList.innerHTML = Array.from({ length: 6 }).map(() => '<div class="skel"></div>').join('');
    return;
  }
  if (!list.length) {
    stationList.innerHTML = `<div class="empty-state"><div class="em-icon">📭</div><div>Ничего не найдено</div></div>`;
    return;
  }
  stationList.innerHTML = list.map(s => stationRowHtml(s)).join('');
}

function renderFavorites() {
  if (!state.favorites.length) {
    favList.innerHTML = `<div class="empty-state"><div class="em-icon">♡</div><div>Список избранного пуст</div><div style="font-size:12px;">Нажмите ♡ на станции, чтобы добавить</div></div>`;
    return;
  }
  favList.innerHTML = state.favorites.map(s => stationRowHtml(s)).join('');
}

function findById(id) {
  return state.allStations.find(s => s.id === id) || state.favorites.find(s => s.id === id);
}

function handleListClick(e) {
  const actionBtn = e.target.closest('[data-action]');
  const row = e.target.closest('.station-item');
  if (!row) return;
  const id = (actionBtn || row).dataset.id;
  const station = findById(id);
  if (!station) return;
  if (actionBtn && actionBtn.dataset.action === 'fav') {
    toggleFav(station);
    renderStationList();
    renderFavorites();
    updateFavButton();
    return;
  }
  if (state.currentStation && state.currentStation.id === station.id) {
    togglePlay();
  } else {
    playStation(station);
  }
}
stationList.addEventListener('click', handleListClick);
favList.addEventListener('click', handleListClick);

/* ============================================================
   CATEGORY CHIPS
   ============================================================ */
function renderChips() {
  const all = [{ id: 'all', label: 'Все', icon: '⭐' }, ...CATEGORIES];
  catFilters.innerHTML = all.map(c =>
    `<div class="chip ${state.currentCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${c.icon} ${c.label}</div>`
  ).join('');
}
catFilters.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  state.currentCategory = chip.dataset.cat;
  renderChips();
  renderStationList();
});

/* ============================================================
   SEARCH
   ============================================================ */
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.searchQuery = searchInput.value;
    renderStationList();
  }, 250);
});

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const pages = document.querySelectorAll('.page');
const tabs = document.querySelectorAll('.tab-btn');
function goToPage(i) {
  state.page = i;
  pages.forEach((p, idx) => p.classList.toggle('active', idx === i));
  tabs.forEach((t, idx) => t.classList.toggle('active', idx === i));
}
tabs.forEach((t, i) => t.addEventListener('click', () => goToPage(i)));

/* ============================================================
   LOADING STATIONS
   ============================================================ */
async function loadAllStations(isRefresh) {
  if (state.fetching) return;
  state.fetching = true;
  if (isRefresh) { refreshBtn.classList.add('spin'); }
  try {
    const seed = SEED_STATIONS.map(normalizeSeed);
    let combined = [...seed];
    const results = await Promise.all(CATEGORIES.map(c => fetchCategory(c).catch(() => [])));
    results.forEach(list => { combined = combined.concat(list); });
    // de-dup by name+category (case-insensitive)
    const seen = new Set();
    combined = combined.filter(s => {
      const key = s.category + '|' + s.name.toLowerCase();
      if (seen.has(key) || !s.url) return false;
      seen.add(key);
      return true;
    });
    state.allStations = combined;
    state.loadedOnce = true;
    renderStationList();
    renderFavorites();
    if (isRefresh) showToast('Список станций обновлён · ' + combined.length);
  } catch (e) {
    if (!state.loadedOnce) {
      state.allStations = SEED_STATIONS.map(normalizeSeed);
      state.loadedOnce = true;
      renderStationList();
    }
    showToast('Не удалось загрузить полный список, используем базовый');
  } finally {
    state.fetching = false;
    refreshBtn.classList.remove('spin');
  }
}

refreshBtn.addEventListener('click', () => loadAllStations(true));

/* ============================================================
   CONTROLS
   ============================================================ */
playBtn.addEventListener('click', togglePlay);
prevBtn.addEventListener('click', prevStation);
nextBtn.addEventListener('click', () => nextStation(false));
favBtn.addEventListener('click', () => {
  if (!state.currentStation) { showToast('Сначала выберите станцию'); return; }
  toggleFav(state.currentStation);
  updateFavButton();
  renderStationList();
  renderFavorites();
});
playerArt.addEventListener('dblclick', togglePlay);

volumeSlider.addEventListener('input', () => {
  state.volume = volumeSlider.value / 100;
  audio.volume = state.volume;
  try { localStorage.setItem('radio_volume_v2', state.volume); } catch (_) {}
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') nextStation(false);
  if (e.key === 'ArrowLeft') prevStation();
});

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  try {
    const v = parseFloat(localStorage.getItem('radio_volume_v2'));
    if (!isNaN(v)) { state.volume = v; volumeSlider.value = Math.round(v * 100); }
  } catch (_) {}

  loadFavorites();
  renderChips();
  renderStationList();
  renderFavorites();

  discoverHosts();
  await loadAllStations(false);

  try {
    const recent = JSON.parse(localStorage.getItem('radio_recent_v2') || 'null');
    if (recent) {
      const found = state.allStations.find(s => s.id === recent.id) || recent;
      renderPlayerInfo.call(null);
      state.currentStation = found;
      renderPlayerInfo();
      updateFavButton();
    }
  } catch (_) {}
}

permBtn.addEventListener('click', async () => {
  permOverlay.classList.remove('show');
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') await ctx.resume();
  } catch (_) {}
  init();
});

console.log('📻 Radio Club v2 ready — multi-mirror Radio-Browser + auto-reconnect audio engine');
})();
</script>
