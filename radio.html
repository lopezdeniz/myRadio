<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Радио — FM / AM</title>
    <link rel="icon" href="icon.png" type="image/png" />
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* ===== CSS VARIABLES (Dynamic UI Scaling) ===== */
        :root {
            --ui-scale: 1;
            --page-bg: #0c0c0d;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-radius: calc(20px * var(--ui-scale));
            --font-size-xl: calc(26px * var(--ui-scale));
            --font-size-lg: calc(20px * var(--ui-scale));
            --font-size-md: calc(16px * var(--ui-scale));
            --font-size-sm: calc(13px * var(--ui-scale));
            --font-size-xs: calc(11px * var(--ui-scale));
            --spacing-xl: calc(28px * var(--ui-scale));
            --spacing-lg: calc(20px * var(--ui-scale));
            --spacing-md: calc(14px * var(--ui-scale));
            --spacing-sm: calc(8px * var(--ui-scale));
            --spacing-xs: calc(4px * var(--ui-scale));
            --btn-size: calc(56px * var(--ui-scale));
            --btn-radius: calc(28px * var(--ui-scale));
            --tab-height: calc(64px * var(--ui-scale));
            --status-height: calc(48px * var(--ui-scale));
            --transition: 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            --blur: saturate(180%) blur(20px);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ===== APP SHELL ===== */
        #app {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--page-bg);
        }

        /* ===== PAGES CONTAINER (horizontal swipe) ===== */
        .pages {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform var(--transition);
            will-change: transform;
            touch-action: none;
        }
        .page {
            flex: 0 0 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            padding: calc(var(--safe-top) + var(--status-height) + var(--spacing-sm)) var(--spacing-md) calc(var(--safe-bottom) + var(--tab-height) + var(--spacing-md)) var(--spacing-md);
            display: flex;
            flex-direction: column;
            background: var(--page-bg);
        }

        /* ===== STATUS BAR (placeholder) ===== */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: var(--status-height);
            padding: 0 var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--font-size-xs);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            background: transparent;
            z-index: 10;
            pointer-events: none;
        }
        .status-bar .time {
            font-variant-numeric: tabular-nums;
        }
        .status-bar .icons {
            display: flex;
            gap: 6px;
            font-size: var(--font-size-xs);
        }

        /* ===== BOTTOM TABS ===== */
        .tabs {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(var(--tab-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(20, 20, 22, 0.92);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-top: 0.5px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: stretch;
            z-index: 20;
            justify-content: space-around;
        }
        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: var(--font-size-xs);
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
            touch-action: manipulation;
            position: relative;
        }
        .tab-btn .icon {
            font-size: calc(22px * var(--ui-scale));
            line-height: 1;
            transition: transform 0.2s;
        }
        .tab-btn .label {
            font-size: var(--font-size-xs);
            letter-spacing: 0.3px;
        }
        .tab-btn.active {
            color: #fff;
        }
        .tab-btn.active .icon {
            transform: scale(1.05);
        }
        .tab-btn .badge {
            position: absolute;
            top: 2px;
            right: 50%;
            transform: translateX(calc(50% + 18px));
            background: #ff3b30;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tab-btn .badge.show {
            opacity: 1;
        }

        /* ===== PAGE: PLAYER ===== */
        #page-player {
            padding-top: calc(var(--safe-top) + var(--status-height) + var(--spacing-sm));
            padding-bottom: calc(var(--safe-bottom) + var(--tab-height) + var(--spacing-md));
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .player-art {
            width: calc(180px * var(--ui-scale));
            height: calc(180px * var(--ui-scale));
            border-radius: 50%;
            background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(60px * var(--ui-scale));
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .player-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .player-art.playing {
            animation: spin 12s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .player-art .placeholder {
            font-size: calc(50px * var(--ui-scale));
            opacity: 0.6;
        }
        .player-station {
            font-size: var(--font-size-xl);
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: var(--spacing-xs);
            line-height: 1.2;
            color: #fff;
            max-width: 90%;
        }
        .player-freq {
            font-size: var(--font-size-sm);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
        }
        .player-band {
            font-size: var(--font-size-xs);
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            text-transform: uppercase;
        }
        .player-lang-tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            font-size: var(--font-size-xs);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: var(--spacing-md);
            letter-spacing: 0.5px;
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: calc(20px * var(--ui-scale));
            margin-top: var(--spacing-sm);
        }
        .ctrl-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: calc(24px * var(--ui-scale));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        .ctrl-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }
        .ctrl-btn.primary {
            width: calc(68px * var(--ui-scale));
            height: calc(68px * var(--ui-scale));
            font-size: calc(32px * var(--ui-scale));
            background: #007aff;
            border-color: #007aff;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
        }
        .ctrl-btn.primary:active {
            background: #0055b3;
            box-shadow: 0 2px 12px rgba(0, 122, 255, 0.2);
        }
        .ctrl-btn.fav {
            background: rgba(255, 255, 255, 0.06);
            font-size: calc(22px * var(--ui-scale));
        }
        .ctrl-btn.fav.active {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.15);
        }
        .ctrl-btn.fav:active {
            transform: scale(0.88);
        }
        .player-meta {
            margin-top: var(--spacing-md);
            font-size: var(--font-size-xs);
            color: rgba(255, 255, 255, 0.3);
            max-width: 80%;
            line-height: 1.4;
            min-height: calc(18px * var(--ui-scale));
        }
        .player-error {
            color: #ff453a;
            font-size: var(--font-size-xs);
            margin-top: var(--spacing-sm);
            min-height: calc(18px * var(--ui-scale));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .player-error.show {
            opacity: 1;
        }

        /* ===== PAGE: BROWSE ===== */
        #page-browse {
            padding-top: calc(var(--safe-top) + var(--status-height) + var(--spacing-sm));
            padding-bottom: calc(var(--safe-bottom) + var(--tab-height) + var(--spacing-md));
        }
        .browse-header {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            flex-shrink: 0;
        }
        .browse-search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .browse-search-wrap .icon {
            position: absolute;
            left: 12px;
            font-size: var(--font-size-md);
            opacity: 0.4;
            pointer-events: none;
        }
        .browse-search {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md) var(--spacing-sm) calc(36px * var(--ui-scale));
            border-radius: calc(12px * var(--ui-scale));
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: var(--font-size-md);
            font-weight: 400;
            outline: none;
            transition: all 0.2s;
            height: calc(40px * var(--ui-scale));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .browse-search::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
        }
        .browse-search:focus {
            border-color: rgba(0, 122, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }
        .browse-filters {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
            flex-shrink: 0;
        }
        .filter-row {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: var(--spacing-xs);
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar {
            display: none;
        }
        .filter-chip {
            padding: 4px 14px;
            border-radius: 14px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            font-size: var(--font-size-xs);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .filter-chip.active {
            background: #007aff;
            color: #fff;
            border-color: #007aff;
        }
        .filter-chip:active {
            transform: scale(0.94);
        }
        .filter-chip.band-chip.active {
            background: #ff9500;
            border-color: #ff9500;
        }
        .browse-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            margin: 0 calc(-1 * var(--spacing-md));
            padding: 0 var(--spacing-md);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        .browse-list::-webkit-scrollbar {
            width: 3px;
        }
        .browse-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        .station-item {
            display: flex;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-sm);
            border-radius: calc(12px * var(--ui-scale));
            transition: background 0.15s;
            gap: var(--spacing-sm);
            cursor: pointer;
            touch-action: manipulation;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.04);
        }
        .station-item:active {
            background: rgba(255, 255, 255, 0.05);
        }
        .station-item .fav-star {
            font-size: var(--font-size-md);
            opacity: 0.2;
            transition: all 0.2s;
            flex-shrink: 0;
            width: calc(28px * var(--ui-scale));
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
            background: none;
            border: none;
            color: #fff;
            padding: 0;
        }
        .station-item .fav-star.active {
            opacity: 1;
            color: #ff3b30;
        }
        .station-item .fav-star:active {
            transform: scale(0.8);
        }
        .station-item .info {
            flex: 1;
            min-width: 0;
        }
        .station-item .name {
            font-size: var(--font-size-md);
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .station-item .sub {
            font-size: var(--font-size-xs);
            color: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }
        .station-item .freq-band {
            font-size: var(--font-size-xs);
            color: rgba(255, 255, 255, 0.25);
            margin-left: auto;
            padding-left: var(--spacing-sm);
            flex-shrink: 0;
            text-align: right;
            min-width: 60px;
        }
        .station-item .play-btn {
            width: calc(32px * var(--ui-scale));
            height: calc(32px * var(--ui-scale));
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: var(--font-size-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .station-item .play-btn:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.12);
        }
        .station-item .play-btn.playing-now {
            background: #007aff;
            color: #fff;
        }
        .browse-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.2);
            font-size: var(--font-size-md);
            gap: var(--spacing-sm);
        }
        .browse-empty .icon {
            font-size: calc(40px * var(--ui-scale));
            opacity: 0.4;
        }

        /* ===== PAGE: FAVORITES ===== */
        #page-favs {
            padding-top: calc(var(--safe-top) + var(--status-height) + var(--spacing-sm));
            padding-bottom: calc(var(--safe-bottom) + var(--tab-height) + var(--spacing-md));
        }
        .favs-header {
            font-size: var(--font-size-xl);
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            flex-shrink: 0;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .favs-header .count {
            font-size: var(--font-size-sm);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
        }
        .favs-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            margin: 0 calc(-1 * var(--spacing-md));
            padding: 0 var(--spacing-md);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        .favs-list::-webkit-scrollbar {
            width: 3px;
        }
        .favs-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        .favs-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.2);
            font-size: var(--font-size-md);
            gap: var(--spacing-sm);
        }
        .favs-empty .icon {
            font-size: calc(48px * var(--ui-scale));
            opacity: 0.3;
        }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            display: inline-block;
            width: calc(20px * var(--ui-scale));
            height: calc(20px * var(--ui-scale));
            border: 2.5px solid rgba(255, 255, 255, 0.08);
            border-top: 2.5px solid #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== PERMISSION OVERLAY ===== */
        #perm-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            text-align: center;
            transition: opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }
        #perm-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        #perm-overlay .icon {
            font-size: calc(56px * var(--ui-scale));
            margin-bottom: var(--spacing-lg);
        }
        #perm-overlay h2 {
            font-size: var(--font-size-xl);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }
        #perm-overlay p {
            font-size: var(--font-size-md);
            color: rgba(255, 255, 255, 0.5);
            max-width: 320px;
            line-height: 1.5;
            margin-bottom: var(--spacing-lg);
        }
        #perm-overlay .btn {
            padding: var(--spacing-sm) var(--spacing-xl);
            border-radius: var(--btn-radius);
            border: none;
            background: #007aff;
            color: #fff;
            font-size: var(--font-size-md);
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
            min-width: 200px;
        }
        #perm-overlay .btn:active {
            transform: scale(0.94);
            background: #0055b3;
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE TWEAKS ===== */
        @media (max-width: 400px) {
            :root {
                --font-size-xl: 22px;
                --font-size-lg: 17px;
                --font-size-md: 14px;
                --btn-size: 48px;
            }
            .player-art {
                width: 140px;
                height: 140px;
            }
            .ctrl-btn.primary {
                width: 56px;
                height: 56px;
                font-size: 26px;
            }
        }
        @media (min-width: 768px) {
            :root {
                --font-size-xl: 32px;
                --font-size-lg: 24px;
                --font-size-md: 18px;
                --btn-size: 68px;
            }
            .player-art {
                width: 220px;
                height: 220px;
            }
            .ctrl-btn.primary {
                width: 80px;
                height: 80px;
                font-size: 38px;
            }
            .page {
                padding-left: var(--spacing-xl);
                padding-right: var(--spacing-xl);
            }
        }

        /* ===== SCROLLBAR STYLING ===== */
        .browse-list,
        .favs-list {
            scroll-behavior: smooth;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: calc(var(--tab-height) + var(--safe-bottom) + var(--spacing-lg));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(30, 30, 32, 0.92);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: calc(14px * var(--ui-scale));
            font-size: var(--font-size-sm);
            color: #fff;
            font-weight: 500;
            z-index: 100;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: none;
            white-space: nowrap;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== REFRESH BUTTON ===== */
        .refresh-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: var(--font-size-md);
            cursor: pointer;

            // ===== DYNAMIC UI SCALING =====
            function adaptLayout() {
                const root = document.documentElement;
                const containerHeight = window.innerHeight;
                const pagesEl = document.querySelectorAll('.page');
                let maxHeight = 0;
                pagesEl.forEach(p => {
                    const h = p.scrollHeight;
                    if (h > maxHeight) maxHeight = h;
                });

                let scale = 1;
                if (maxHeight > containerHeight) {
                    const ratio = containerHeight / maxHeight;
                    scale = Math.max(0.85, Math.min(1, ratio));
                }
                root.style.setProperty('--ui-scale', scale);

                const stillOverflows = maxHeight * scale > containerHeight;
                pagesEl.forEach(p => {
                    if (stillOverflows) {
                        p.style.overflowY = 'auto';
                        p.style.overflowX = 'hidden';
                        p.style.webkitOverflowScrolling = 'touch';
                    } else {
                        p.style.overflowY = 'hidden';
                        p.style.overflowX = 'hidden';
                    }
                });
            }

                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);

                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');

                statusTime.textContent = h + ':' + m;
            }
            setInterval(updateClock, 10000);
            updateClock();

            // ===== FAVORITES STORAGE =====
            function loadFavorites() {
                try {
                    const raw = localStorage.getItem('radio_favorites');
                    if (raw) {
                        state.favorites = JSON.parse(raw);
                        if (!Array.isArray(state.favorites)) state.favorites = [];
                    } else {
                        state.favorites = [];
                    }
                } catch (_) { state.favorites = []; }
                const seen = new Set();
                state.favorites = state.favorites.filter(s => {
                    const key = s.stationuuid || s.id || s.name;
                    if (seen.has(key)) return false;
                    if (key) seen.add(key);
                    return true;
                });
                saveFavorites();
            }

            function saveFavorites() {
                try {
                    localStorage.setItem('radio_favorites', JSON.stringify(state.favorites));
                } catch (_) { /* ignore */ }
                updateFavBadges();
                renderFavorites();
            }

            function isFav(station) {
                const id = station.stationuuid || station.id || station.name;
                return state.favorites.some(s => (s.stationuuid || s.id || s.name) === id);
            }

            function toggleFav(station) {
                const id = station.stationuuid || station.id || station.name;
                const idx = state.favorites.findIndex(s => (s.stationuuid || s.id || s.name) === id);
                if (idx >= 0) {
                    state.favorites.splice(idx, 1);
                    showToast('Удалено из избранного');
                } else {
                    const copy = { ...station };
                    state.favorites.push(copy);
                    showToast('Добавлено в избранное ♡');
                }
                saveFavorites();
                updateFavButton();
                renderStationList();
                renderFavorites();
                updateFavBadges();
                return idx < 0;
            }

                    favBtn.textContent = '♥';

                    state.isFavorite = false;

            }

            // ===== AUDIO ENGINE =====
            function initAudio() {
                if (state.audioElement) return;
                const audio = new Audio();
                audio.crossOrigin = 'anonymous';
                audio.preload = 'none';
                audio.autoplay = false;

                audio.addEventListener('playing', () => {
                    state.isPlaying = true;
                    updatePlayButton();
                    playerArt.classList.add('playing');
                    playerError.classList.remove('show');
                    state.errorCount = 0;
                });

                audio.addEventListener('pause', () => {
                    state.isPlaying = false;
                    updatePlayButton();
                    playerArt.classList.remove('playing');
                });

                audio.addEventListener('error', (e) => {
                    console.warn('Audio error', e);
                    state.errorCount++;
                    if (state.errorCount > 3) {
                        playerError.textContent = 'Не удаётся воспроизвести поток';
                        playerError.classList.add('show');
                        state.isPlaying = false;
                        updatePlayButton();
                        playerArt.classList.remove('playing');
                    } else {
                        setTimeout(() => {
                            if (state.currentStation && state.isPlaying) {
                                playStation(state.currentStation, true);
                            }
                        }, 1500);
                    }
                });

                audio.addEventListener('stalled', () => {
                    if (state.isPlaying) {
                        setTimeout(() => {
                            if (state.isPlaying && state.currentStation) {
                                audio.load();
                                audio.play().catch(() => {});
                            }
                        }, 2000);
                    }
                });

                state.audioElement = audio;
            }

            function playStation(station, retry = false) {
                if (!station) return;
                if (!state.audioElement) initAudio();

                const audio = state.audioElement;

                if (state.currentStation && state.currentStation.stationuuid === station.stationuuid && state.isPlaying) {
                    audio.pause();
                    return;
                }

                if (state.currentStation && state.currentStation.stationuuid === station.stationuuid && !state.isPlaying) {
                    audio.play().catch(() => {});
                    return;
                }

                state.currentStation = station;
                state.errorCount = 0;
                playerError.classList.remove('show');

                playerStation.textContent = station.name || 'Без названия';
                const freq = station.frequency || 0;
                const band = station.band || 'FM';
                playerFreq.textContent = freq ? freq.toFixed(1) + ' MHz' : '— — —';
                playerBand.textContent = band;

                const langMap = {
                    russian: '🇷🇺 Русский',
                    english: '🇬🇧 English',
                    spanish: '🇪🇸 Español'
                };
                const lang = (station.language || '').toLowerCase();
                let langDisplay = '🌐 Разное';
                if (lang.includes('russian')) langDisplay = langMap.russian;
                else if (lang.includes('english')) langDisplay = langMap.english;
                else if (lang.includes('spanish')) langDisplay = langMap.spanish;
                playerLang.textContent = langDisplay;

                const metaParts = [];
                if (station.country) metaParts.push(station.country);
                if (station.genre) metaParts.push(station.genre);
                playerMeta.textContent = metaParts.join(' · ') || '';

                if (station.favicon && station.favicon.startsWith('http')) {
                    const img = document.createElement('img');
                    img.src = station.favicon;
                    img.alt = station.name;
                    img.onerror = () => { playerArt.innerHTML = '<span class="placeholder">📻</span>'; };
                    img.onload = () => {
                        playerArt.innerHTML = '';
                        playerArt.appendChild(img);
                    };
                    setTimeout(() => {
                        if (!playerArt.querySelector('img')) {
                            playerArt.innerHTML = '<span class="placeholder">📻</span>';
                        }
                    }, 3000);
                } else {
                    playerArt.innerHTML = '<span class="placeholder">📻</span>';
                }

                updateFavButton();

                let streamUrl = station.url || '';
                if (!streamUrl) {
                    playerError.textContent = 'Ссылка на поток отсутствует';
                    playerError.classList.add('show');
                    return;
                }

                if (streamUrl.startsWith('http://')) {
                    streamUrl = streamUrl.replace('http://', 'https://');
                }

                audio.src = streamUrl;
                audio.load();
                audio.play().catch((err) => {
                    console.warn('Play error:', err);
                    if (streamUrl.startsWith('https://')) {
                        const httpUrl = streamUrl.replace('https://', 'http://');
                        audio.src = httpUrl;
                        audio.load();
                        audio.play().catch((e2) => {
                            console.warn('HTTP fallback failed:', e2);
                            playerError.textContent = 'Не удалось подключиться к потоку';
                            playerError.classList.add('show');
                        });
                    } else {
                        playerError.textContent = 'Ошибка воспроизведения';
                        playerError.classList.add('show');
                    }
                });

                try {
                    let recents = JSON.parse(localStorage.getItem('radio_recent') || '[]');
                    recents = recents.filter(s => s.stationuuid !== station.stationuuid);
                    recents.unshift(station);
                    if (recents.length > 20) recents = recents.slice(0, 20);
                    localStorage.setItem('radio_recent', JSON.stringify(recents));
                } catch (_) { /* ignore */ }
            }

            function togglePlay() {
                if (!state.audioElement) {
                    if (state.currentStation) {
                        playStation(state.currentStation);
                    } else {
                        const list = state.stations;
                        if (list.length > 0) {
                            playStation(list[0]);
                        } else {
                            showToast('Нет доступных станций');
                        }
                    }
                    return;
                }

                if (state.isPlaying) {
                    state.audioElement.pause();
                } else {
                    if (state.currentStation) {
                        state.audioElement.play().catch(() => {
                            if (state.currentStation) {
                                playStation(state.currentStation, true);
                            }
                        });
                    } else {
                        const list = state.stations;
                        if (list.length > 0) {
                            playStation(list[0]);
                        } else {
                            showToast('Нет доступных станций');
                        }
                    }
                }
            }

            function updatePlayButton() {
                playBtn.textContent = state.isPlaying ? '⏸' : '▶';
                if (state.isPlaying) {
                    playBtn.classList.add('playing');
                } else {
                    playBtn.classList.remove('playing');
                }
            }

            function nextStation() {
                const list = state.stations;
                if (list.length === 0) return;
                const idx = list.findIndex(s => s.stationuuid === (state.currentStation ? state.currentStation
                    .stationuuid : null));
                const nextIdx = (idx + 1) % list.length;
                playStation(list[nextIdx]);
            }

            function prevStation() {
                const list = state.stations;
                if (list.length === 0) return;
                const idx = list.findIndex(s => s.stationuuid === (state.currentStation ? state.currentStation
                    .stationuuid : null));
                const prevIdx = (idx - 1 + list.length) % list.length;
                playStation(list[prevIdx]);
            }

                        const data = await resp.json();

            // ===== FILTERING AND RENDERING =====
            function applyFiltersAndSearch() {
                const query = state.searchQuery.toLowerCase().trim();
                const country = state.currentCountry;
                const band = state.currentBand;

                let filtered = state.allStations;

                if (country !== 'all') {
                    filtered = filtered.filter(s => s.country === country);
                }
                if (band !== 'all') {
                    filtered = filtered.filter(s => s.band === band);
                }
                if (query) {
                    filtered = filtered.filter(s =>
                        (s.name || '').toLowerCase().includes(query) ||
                        (s.country || '').toLowerCase().includes(query) ||
                        (s.language || '').toLowerCase().includes(query) ||
                        (s.genre || '').toLowerCase().includes(query) ||
                        (s.frequency && s.frequency.toString().includes(query)) ||
                        (s.band && s.band.toLowerCase().includes(query))
                    );
                }

                // sort by popularity (name)
                filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

                state.stations = filtered;
                renderStationList();

                tabBadges.station.textContent = filtered.length;
                tabBadges.station.classList.toggle('show', filtered.length > 0);

                if (state.currentStation && !filtered.some(s => s.stationuuid === state.currentStation.stationuuid)) {
                    // keep current station playing even if not in list
                }
            }

            // ===== NAVIGATION =====
            function goToPage(index) {
                if (index < 0 || index >= 3) return;
                state.currentPage = index;
                pages.style.transform = `translateX(-${index * 100}%)`;
                tabs.forEach((tab, i) => {
                    tab.classList.toggle('active', i === index);
                });
                setTimeout(adaptLayout, 50);
            }

            // ===== FILTER EVENTS =====
            countryFilters.addEventListener('click', (e) => {
                const chip = e.target.closest('.filter-chip');
                if (!chip || !chip.dataset.country) return;
                countryFilters.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                state.currentCountry = chip.dataset.country;
                applyFiltersAndSearch();
                setTimeout(adaptLayout, 100);
            });

            bandFilters.addEventListener('click', (e) => {
                const chip = e.target.closest('.filter-chip');
                if (!chip || !chip.dataset.band) return;
                bandFilters.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                state.currentBand = chip.dataset.band;
                applyFiltersAndSearch();
                setTimeout(adaptLayout, 100);
            });

            // ===== SEARCH =====
            let searchTimer = null;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    state.searchQuery = searchInput.value;
                    applyFiltersAndSearch();
                    setTimeout(adaptLayout, 100);
                }, 300);
            });

            // ===== TAB CLICKS =====
            tabs.forEach((tab, i) => {
                tab.addEventListener('click', () => {
                    goToPage(i);
                });
            });

            // ===== SWIPE NAVIGATION =====
            let touchStartX = 0;
            let touchStartY = 0;
            let touchDeltaX = 0;
            let touchDeltaY = 0;
            let isSwiping = false;

            const pagesContainer = document.getElementById('pages');

            pagesContainer.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                touchStartX = t.clientX;
                touchStartY = t.clientY;
                touchDeltaX = 0;
                touchDeltaY = 0;
                isSwiping = false;
            }, { passive: true });

            pagesContainer.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const dx = t.clientX - touchStartX;
                const dy = t.clientY - touchStartY;
                touchDeltaX = dx;
                touchDeltaY = dy;

                if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                    isSwiping = true;
                }

                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 15) {
                    e.preventDefault();
                    const offset = -state.currentPage * window.innerWidth + dx;
                    pages.style.transform = `translateX(${offset}px)`;
                    pages.style.transition = 'none';
                }
            }, { passive: false });

            pagesContainer.addEventListener('touchend', (e) => {
                if (!isSwiping) {
                    if (state.currentPage === 0) {
                        const target = e.target.closest('.ctrl-btn, .player-art, .player-station, .player-freq, .player-band, .player-lang-tag, .player-meta');
                        if (!target) {
                            togglePlay();
                        }
                    }
                    return;
                }

                const threshold = window.innerWidth * 0.25;
                const dx = touchDeltaX;

                pages.style.transition = 'transform var(--transition)';

                if (dx < -threshold && state.currentPage < 2) {
                    goToPage(state.currentPage + 1);
                } else if (dx > threshold && state.currentPage > 0) {
                    goToPage(state.currentPage - 1);
                } else {
                    goToPage(state.currentPage);
                }

                isSwiping = false;
                touchDeltaX = 0;
                touchDeltaY = 0;
            }, { passive: true });

            // ===== KEYBOARD SHORTCUTS =====
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    nextStation();
                }
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevStation();
                }
            });

            // ===== PLAYER CONTROLS =====
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevStation);
            nextBtn.addEventListener('click', nextStation);

            favBtn.addEventListener('click', () => {
                if (!state.currentStation) {
                    showToast('Сначала выберите станцию');
                    return;
                }
                const added = toggleFav(state.currentStation);
                updateFavButton();
                renderStationList();
                renderFavorites();
                updateFavBadges();
            });

            playerArt.addEventListener('dblclick', togglePlay);

            // ===== REFRESH =====
            refreshBtn.addEventListener('click', () => {
                if (state.refreshInProgress) return;
                fetchStationsFromSources();
            });

            // ===== PERMISSIONS =====
            async function requestPermissions() {
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    if (ctx.state === 'suspended') {
                        await ctx.resume();
                    }
                } catch (_) { /* ignore */ }

                try {
                    if ('Notification' in window && Notification.permission === 'default') {
                        await Notification.requestPermission();
                    }
                } catch (_) { /* ignore */ }

                state.permissionsGranted = true;
                permOverlay.classList.remove('show');

                initAudio();
                loadFavorites();

                // Initial load
                state.allStations = [...BASE_STATIONS];
                applyFiltersAndSearch();

                // Then fetch from sources
                await fetchStationsFromSources();

                // try restore recent
                try {
                    const recents = JSON.parse(localStorage.getItem('radio_recent') || '[]');
                    if (recents.length > 0) {
                        const last = recents[0];
                        const found = state.allStations.find(s => s.stationuuid === last.stationuuid);
                        if (found) {
                            playStation(found);
                        } else if (recents.length > 1) {
                            const found2 = state.allStations.find(s => s.stationuuid === recents[1].stationuuid);
                            if (found2) playStation(found2);
                        }
                    }
                } catch (_) { /* ignore */ }

                adaptLayout();
                setTimeout(adaptLayout, 300);
            }

            permBtn.addEventListener('click', requestPermissions);

            // ===== WINDOW EVENTS =====
            window.addEventListener('resize', () => {
                adaptLayout();
            });

            window.addEventListener('orientationchange', () => {
                setTimeout(adaptLayout, 400);
            });

            // ===== INIT =====
            permOverlay.classList.add('show');
            loadFavorites();
            updateFavBadges();
            setTimeout(adaptLayout, 100);

            document.addEventListener('visibilitychange', () => {
                // keep playing in background
            });

            console.log('📻 Radio App ready with extended club/dance stations + auto-refresh');

        })();
    </script>
</body>
</html>
